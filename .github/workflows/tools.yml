name: Developer Toolkit Engine

on:
  workflow_dispatch:
    inputs:
      id:
        required: true
        type: string
      toolType:
        required: true
        type: string
      fileUrl:
        required: true
        type: string
      webhookUrl:
        required: true
        type: string
      logUrl:
        required: true
        type: string
      keystoreB64:
        required: false
        type: string
      keystoreMeta:
        required: false
        type: string

jobs:
  process_tool:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Prepare
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Menginisiasi Cloud Engine Workspace...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          wget -q https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar
          wget -q https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar -O apktool.jar
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Dependency berhasil diunduh.\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - name: Fetch
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Network] Mengunduh file sumber...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          curl -sL "${{ inputs.fileUrl }}" -o input_file

      - name: Execute
        id: executor
        run: |
          TOOL_TYPE="${{ inputs.toolType }}"
          FILE_URL="${{ inputs.fileUrl }}"
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          
          if [ "$TOOL_TYPE" == "aab2apk" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Mengonversi AAB ke APK Universal...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            java -jar bundletool.jar build-apks --bundle=input_file --output=output.apks --mode=universal > build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Konversi gagal.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
            unzip -p output.apks universal.apk > final_output.apk
            echo "ext=apk" >> $GITHUB_OUTPUT
            
          elif [ "$TOOL_TYPE" == "signer" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Signer] Mempersiapkan Keystore...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            echo "${{ inputs.keystoreB64 }}" | base64 -d > keystore.jks
            echo "${{ inputs.keystoreMeta }}" > meta.txt
            ALIAS=$(grep '^ALIAS=' meta.txt | cut -d'=' -f2-)
            PASS=$(grep '^PASS=' meta.txt | cut -d'=' -f2-)
            ALIAS_PASS=$(grep '^ALIAS_PASS=' meta.txt | cut -d'=' -f2-)
            
            if [[ "$FILE_URL" == *".aab" ]]; then
              jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass "$PASS" -keypass "$ALIAS_PASS" input_file "$ALIAS" > build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Sign AAB gagal.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
              mv input_file final_output.aab
              echo "ext=aab" >> $GITHUB_OUTPUT
            else
              $BUILD_TOOLS/zipalign -p -f -v 4 input_file aligned_input.apk > build_log.txt 2>&1 || true
              $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:"$PASS" --ks-key-alias "$ALIAS" --key-pass pass:"$ALIAS_PASS" aligned_input.apk >> build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Sign APK gagal.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
              mv aligned_input.apk final_output.apk
              echo "ext=apk" >> $GITHUB_OUTPUT
            fi
            
          elif [ "$TOOL_TYPE" == "apk2aab" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Decode APK...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            java -jar apktool.jar d input_file -s -o decoded_apk -f > build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Decode APK gagal.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
            
            $BUILD_TOOLS/aapt2 compile --dir decoded_apk/res -o compiled_resources.zip >> build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Gagal aapt2 compile.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
            $BUILD_TOOLS/aapt2 link --proto-format -o linked_base.apk -I $ANDROID_JAR --manifest decoded_apk/AndroidManifest.xml -R compiled_resources.zip --auto-add-overlay >> build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Gagal aapt2 link.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
            
            unzip -q linked_base.apk -d ext_linked
            mkdir -p bundle/base/manifest bundle/base/dex bundle/base/res bundle/base/root/assets bundle/base/root/lib bundle/base/root/META-INF bundle/base/root/kotlin
            
            cp ext_linked/AndroidManifest.xml bundle/base/manifest/
            cp -r ext_linked/res/* bundle/base/res/ 2>/dev/null || true
            cp ext_linked/resources.pb bundle/base/ 2>/dev/null || true
            cp decoded_apk/*.dex bundle/base/dex/ 2>/dev/null || true
            cp -r decoded_apk/assets/* bundle/base/root/assets/ 2>/dev/null || true
            cp -r decoded_apk/lib/* bundle/base/root/lib/ 2>/dev/null || true
            cp -r decoded_apk/kotlin/* bundle/base/root/kotlin/ 2>/dev/null || true
            
            cd bundle/base
            zip -qr ../base.zip .
            cd ../..
            
            java -jar bundletool.jar build-bundle --modules=bundle/base.zip --output=final_output.aab >> build_log.txt 2>&1 || (curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] Bundletool gagal.\\n\"}" "${{ inputs.logUrl }}"; exit 1)
            echo "ext=aab" >> $GITHUB_OUTPUT
          fi

      - name: Deliver
        if: success()
        run: |
          OUT_EXT="${{ steps.executor.outputs.ext }}"
          if [ -f "final_output.$OUT_EXT" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Mengirim file ke server...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @final_output.$OUT_EXT "${{ inputs.webhookUrl }}&tool_status=success&ext=$OUT_EXT" > /dev/null || true
          else
            curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
          fi
          
      - name: Handle Failure
        if: failure()
        run: |
          curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
