name: Developer Toolkit Engine

run-name: Tool Job - ${{ inputs.id }} (${{ inputs.toolType }})

on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      toolType: { required: true, type: string }
      fileUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      keystoreB64: { required: false, type: string }
      keystoreMeta: { required: false, type: string }

permissions:
  contents: write

jobs:
  process_tool:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }

      - name: Initialization & Setup
        run: |
          jq -n --arg log "[System] Menginisiasi Cloud Engine Workspace...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
          
          # Hapus intervensi auto-restart pada ubuntu-latest
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get update -yq > /dev/null 2>&1
          sudo NEEDRESTART_MODE=a DEBIAN_FRONTEND=noninteractive apt-get install -yq --no-install-recommends wget unzip zipalign curl jq zip > /dev/null 2>&1
          
          wget -q https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar
          
          # Paksa Android SDK Tools versi 34 untuk memastikan kompabilitas AAPT2
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" > /dev/null 2>&1
          
          jq -n --arg log "[System] Dependency berhasil disiapkan.\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true

      - name: Fetch Target File
        run: |
          jq -n --arg log "[Network] Mengunduh file target dari Server...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
          curl -sL "${{ inputs.fileUrl }}" -o input_file
          
          # Validasi apakah file APK/AAB valid (bukan HTML Cloudflare/Corrupt)
          if ! unzip -t input_file > /dev/null 2>&1; then
            jq -n --arg log "[Error] File rusak atau bukan APK/AAB valid (Periksa limit/firewall).\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            exit 1
          fi
          
          jq -n --arg log "[Network] File berhasil diunduh dan tervalidasi.\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true

      - name: Execute Toolkit Engine
        id: executor
        run: |
          TOOL_TYPE="${{ inputs.toolType }}"
          FILE_URL="${{ inputs.fileUrl }}"
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          BUILD_TOOLS="$ANDROID_HOME/build-tools/34.0.0"
          
          if [ "$TOOL_TYPE" == "aab2apk" ]; then
            jq -n --arg log "[Convert] Mengonversi AAB ke APK Universal...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            
            if ! java -jar bundletool.jar build-apks --bundle=input_file --output=output.apks --mode=universal > build_log.txt 2>&1; then
               ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
               jq -n --arg log "[Error] Bundletool gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
               exit 1
            fi
            
            unzip -p output.apks universal.apk > final_output.apk
            echo "ext=apk" >> $GITHUB_OUTPUT
            
          elif [ "$TOOL_TYPE" == "signer" ]; then
            jq -n --arg log "[Signer] Mempersiapkan Keystore...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            echo "${{ inputs.keystoreB64 }}" | base64 -d > keystore.jks
            echo "${{ inputs.keystoreMeta }}" > meta.txt
            ALIAS=$(grep '^ALIAS=' meta.txt | cut -d'=' -f2-)
            PASS=$(grep '^PASS=' meta.txt | cut -d'=' -f2-)
            ALIAS_PASS=$(grep '^ALIAS_PASS=' meta.txt | cut -d'=' -f2-)
            
            if [[ "$FILE_URL" == *".aab" ]]; then
              jq -n --arg log "[Signer] Menandatangani file AAB...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
              if ! jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass "$PASS" -keypass "$ALIAS_PASS" input_file "$ALIAS" > build_log.txt 2>&1; then
                 ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
                 jq -n --arg log "[Error] Jarsigner gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
                 exit 1
              fi
              mv input_file final_output.aab
              echo "ext=aab" >> $GITHUB_OUTPUT
            else
              jq -n --arg log "[Signer] Menjalankan Zipalign & Apksigner...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
              zipalign -p -f -v 4 input_file aligned_input.apk > build_log.txt 2>&1 || true
              
              if ! $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:"$PASS" --ks-key-alias "$ALIAS" --key-pass pass:"$ALIAS_PASS" aligned_input.apk >> build_log.txt 2>&1; then
                 ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
                 jq -n --arg log "[Error] Apksigner gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
                 exit 1
              fi
              mv aligned_input.apk final_output.apk
              echo "ext=apk" >> $GITHUB_OUTPUT
            fi
            
          elif [ "$TOOL_TYPE" == "apk2aab" ]; then
            jq -n --arg log "[Convert] Decode APK (Bisa memakan waktu beberapa menit)...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            
            if ! java -jar apktool.jar d input_file -s -o decoded_apk -f > build_log.txt 2>&1; then
               ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
               jq -n --arg log "[Error] Apktool Decode gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
               exit 1
            fi
            
            jq -n --arg log "[Convert] Kompilasi Resource AAPT2...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            if ! $BUILD_TOOLS/aapt2 compile --dir decoded_apk/res -o compiled_resources.zip >> build_log.txt 2>&1; then
               ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
               jq -n --arg log "[Error] AAPT2 Compile gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
               exit 1
            fi
            
            jq -n --arg log "[Convert] Linking Protocol Buffer...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            if ! $BUILD_TOOLS/aapt2 link --proto-format -o linked_base.apk -I $ANDROID_JAR --manifest decoded_apk/AndroidManifest.xml -R compiled_resources.zip --auto-add-overlay >> build_log.txt 2>&1; then
               ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
               jq -n --arg log "[Error] AAPT2 Link gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
               exit 1
            fi
            
            unzip -q linked_base.apk -d ext_linked
            mkdir -p bundle/base/manifest bundle/base/dex bundle/base/res bundle/base/root/assets bundle/base/root/lib bundle/base/root/META-INF bundle/base/root/kotlin
            
            cp ext_linked/AndroidManifest.xml bundle/base/manifest/
            cp -r ext_linked/res/* bundle/base/res/ 2>/dev/null || true
            cp ext_linked/resources.pb bundle/base/ 2>/dev/null || true
            cp decoded_apk/*.dex bundle/base/dex/ 2>/dev/null || true
            cp -r decoded_apk/assets/* bundle/base/root/assets/ 2>/dev/null || true
            cp -r decoded_apk/lib/* bundle/base/root/lib/ 2>/dev/null || true
            cp -r decoded_apk/kotlin/* bundle/base/root/kotlin/ 2>/dev/null || true
            
            cd bundle/base
            zip -qr ../base.zip .
            cd ../..
            
            jq -n --arg log "[Convert] Membangun AAB dengan Bundletool...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            if ! java -jar bundletool.jar build-bundle --modules=bundle/base.zip --output=final_output.aab >> build_log.txt 2>&1; then
               ERR=$(tail -n 15 build_log.txt || echo "Unknown Error")
               jq -n --arg log "[Error] Bundletool gagal:\n$ERR\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}"
               exit 1
            fi
            echo "ext=aab" >> $GITHUB_OUTPUT
          fi

      - name: Deliver Result
        if: success()
        run: |
          OUT_EXT="${{ steps.executor.outputs.ext }}"
          if [ -f "final_output.$OUT_EXT" ]; then
            jq -n --arg log "[System] Mengirim file ke server...\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @final_output.$OUT_EXT "${{ inputs.webhookUrl }}&tool_status=success&ext=$OUT_EXT" > /dev/null || true
          else
            jq -n --arg log "[Error] File output tidak ditemukan.\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
          fi
          
      - name: Handle Failure
        if: failure()
        run: |
          curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
