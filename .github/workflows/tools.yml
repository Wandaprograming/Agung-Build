name: Developer Toolkit Engine

run-name: Tool Job - ${{ inputs.id }} (${{ inputs.toolType }})

on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      toolType: { required: true, type: string }
      fileUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      keystoreB64: { required: false, type: string }
      keystoreMeta: { required: false, type: string }

permissions:
  contents: write

jobs:
  process_tool:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }

      - name: Initialization & Setup
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Menginisiasi Cloud Engine Workspace...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          
          curl -sL https://github.com/google/bundletool/releases/download/1.17.1/bundletool-all-1.17.1.jar -o bundletool.jar
          curl -sL https://github.com/iBotPeaches/Apktool/releases/download/v2.10.0/apktool_2.10.0.jar -o apktool.jar
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Dependency berhasil disiapkan.\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - name: Fetch Target File
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Network] Mengunduh file target dari Server...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          curl -sL "${{ inputs.fileUrl }}" -o input_file
          
          if ! unzip -t input_file > /dev/null 2>&1; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] File rusak atau bukan APK/AAB valid.\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            exit 1
          fi
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Network] File berhasil diunduh dan tervalidasi.\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - name: Execute Toolkit Engine
        id: executor
        run: |
          TOOL_TYPE="${{ inputs.toolType }}"
          FILE_URL="${{ inputs.fileUrl }}"
          
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          AAPT2=$(find $ANDROID_SDK_ROOT/build-tools -name aapt2 | sort -V | tail -n 1)
          ANDROID_JAR=$(find $ANDROID_SDK_ROOT/platforms -name android.jar | sort -V | tail -n 1)
          
          if [ "$TOOL_TYPE" == "aab2apk" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Mengonversi AAB ke APK Universal...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            
            if ! java -jar bundletool.jar build-apks --bundle=input_file --output=output.apks --mode=universal > build_log.txt 2>&1; then
               ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
               jq -n --arg id "${{ inputs.id }}" --arg log "[Error] Bundletool gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
               exit 1
            fi
            
            unzip -p output.apks universal.apk > final_output.apk
            echo "ext=apk" >> $GITHUB_OUTPUT
            
          elif [ "$TOOL_TYPE" == "signer" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Signer] Mempersiapkan Keystore...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            echo "${{ inputs.keystoreB64 }}" | base64 -d > keystore.jks
            echo "${{ inputs.keystoreMeta }}" > meta.txt
            ALIAS=$(grep '^ALIAS=' meta.txt | cut -d'=' -f2-)
            PASS=$(grep '^PASS=' meta.txt | cut -d'=' -f2-)
            ALIAS_PASS=$(grep '^ALIAS_PASS=' meta.txt | cut -d'=' -f2-)
            
            if [[ "$FILE_URL" == *".aab" ]]; then
              curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Signer] Menandatangani file AAB...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
              if ! jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass "$PASS" -keypass "$ALIAS_PASS" input_file "$ALIAS" > build_log.txt 2>&1; then
                 ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
                 jq -n --arg id "${{ inputs.id }}" --arg log "[Error] Jarsigner gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
                 exit 1
              fi
              mv input_file final_output.aab
              echo "ext=aab" >> $GITHUB_OUTPUT
            else
              curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Signer] Menjalankan Zipalign & Apksigner...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
              $ZIPALIGN -p -f -v 4 input_file aligned_input.apk > build_log.txt 2>&1 || true
              
              if ! $APKSIGNER sign --ks keystore.jks --ks-pass pass:"$PASS" --ks-key-alias "$ALIAS" --key-pass pass:"$ALIAS_PASS" aligned_input.apk >> build_log.txt 2>&1; then
                 ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
                 jq -n --arg id "${{ inputs.id }}" --arg log "[Error] Apksigner gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
                 exit 1
              fi
              mv aligned_input.apk final_output.apk
              echo "ext=apk" >> $GITHUB_OUTPUT
            fi
            
          elif [ "$TOOL_TYPE" == "apk2aab" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Decode APK (Bisa memakan waktu beberapa menit)...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            
            if ! java -jar apktool.jar d input_file -s -o decoded_apk -f > build_log.txt 2>&1; then
               ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
               jq -n --arg id "${{ inputs.id }}" --arg log "[Error] Apktool Decode gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
               exit 1
            fi
            
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Sanitize Invalid Resource Names (Material 3)...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            find decoded_apk/res -depth -name "*\$*" | while IFS= read -r path; do
                newpath=$(echo "$path" | tr '$' '_')
                mv "$path" "$newpath"
            done
            find decoded_apk/res -type f -name "*.xml" -exec sed -i -E 's/name="\$/name="_/g' {} +
            find decoded_apk/res -type f -name "*.xml" -exec sed -i -E 's/@(drawable|anim|layout|color|mipmap|string|id|bool|dimen|style|integer|array)\/\$/@\1\/_/g' {} +
            
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Kompilasi Resource AAPT2...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            if ! $AAPT2 compile --dir decoded_apk/res -o compiled_resources.zip >> build_log.txt 2>&1; then
               ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
               jq -n --arg id "${{ inputs.id }}" --arg log "[Error] AAPT2 Compile gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
               exit 1
            fi
            
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Linking Protocol Buffer...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            if ! $AAPT2 link --proto-format -o linked_base.apk -I $ANDROID_JAR --manifest decoded_apk/AndroidManifest.xml -R compiled_resources.zip --auto-add-overlay >> build_log.txt 2>&1; then
               ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
               jq -n --arg id "${{ inputs.id }}" --arg log "[Error] AAPT2 Link gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
               exit 1
            fi
            
            unzip -q linked_base.apk -d ext_linked
            mkdir -p bundle/base/manifest bundle/base/dex bundle/base/res bundle/base/root/assets bundle/base/root/lib bundle/base/root/META-INF bundle/base/root/kotlin
            
            cp ext_linked/AndroidManifest.xml bundle/base/manifest/
            cp -r ext_linked/res/* bundle/base/res/ 2>/dev/null || true
            cp ext_linked/resources.pb bundle/base/ 2>/dev/null || true
            cp decoded_apk/*.dex bundle/base/dex/ 2>/dev/null || true
            cp -r decoded_apk/assets/* bundle/base/root/assets/ 2>/dev/null || true
            cp -r decoded_apk/lib/* bundle/base/root/lib/ 2>/dev/null || true
            cp -r decoded_apk/kotlin/* bundle/base/root/kotlin/ 2>/dev/null || true
            
            cd bundle/base
            zip -qr ../base.zip .
            cd ../..
            
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Convert] Membangun AAB dengan Bundletool...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            if ! java -jar bundletool.jar build-bundle --modules=bundle/base.zip --output=final_output.aab >> build_log.txt 2>&1; then
               ERROR_MSG=$(tail -n 20 build_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
               jq -n --arg id "${{ inputs.id }}" --arg log "[Error] Bundletool gagal:\n$ERROR_MSG\n" '{"log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
               exit 1
            fi
            echo "ext=aab" >> $GITHUB_OUTPUT
          fi

      - name: Deliver Result
        if: success()
        run: |
          OUT_EXT="${{ steps.executor.outputs.ext }}"
          if [ -f "final_output.$OUT_EXT" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[System] Mengirim file ke server...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @final_output.$OUT_EXT "${{ inputs.webhookUrl }}&tool_status=success&ext=$OUT_EXT" > /dev/null || true
          else
            curl -s -X POST -H "Content-Type: application/json" -d "{\"log\": \"[Error] File output tidak ditemukan.\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
          fi
          
      - name: Handle Failure
        if: failure()
        run: |
          curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
