name: Developer Toolkit Engine

on:
  workflow_dispatch:
    inputs:
      id:
        required: true
        type: string
      toolType:
        required: true
        type: string
      fileUrl:
        required: true
        type: string
      webhookUrl:
        required: true
        type: string
      keystoreB64:
        required: false
        type: string
      keystoreMeta:
        required: false
        type: string

jobs:
  process_tool:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: System Preparation
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip openjdk-17-jdk zipalign curl jq zip
          
          # Download Android Bundletool
          wget -q https://github.com/google/bundletool/releases/download/1.15.6/bundletool-all-1.15.6.jar -O bundletool.jar
          
          # Download APKTool
          wget -q https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar -O apktool.jar
          
      - name: Fetch Input Artifact
        run: |
          curl -sL "${{ inputs.fileUrl }}" -o input_file
          
      - name: Toolkit Engine Router
        id: executor
        run: |
          TOOL_TYPE="${{ inputs.toolType }}"
          FILE_URL="${{ inputs.fileUrl }}"
          
          # Define Android SDK Tools Paths from GitHub Ubuntu Runner
          ANDROID_JAR="$ANDROID_HOME/platforms/android-34/android.jar"
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/* | sort -V | tail -1)
          
          if [ "$TOOL_TYPE" == "aab2apk" ]; then
            echo "[INFO] Executing AAB to APK Conversion..."
            java -jar bundletool.jar build-apks --bundle=input_file --output=output.apks --mode=universal
            unzip -p output.apks universal.apk > final_output.apk
            echo "ext=apk" >> $GITHUB_OUTPUT
            
          elif [ "$TOOL_TYPE" == "signer" ]; then
            echo "[INFO] Executing Cryptographic Signer..."
            echo "${{ inputs.keystoreB64 }}" | base64 -d > keystore.jks
            echo "${{ inputs.keystoreMeta }}" > meta.txt
            
            ALIAS=$(grep '^ALIAS=' meta.txt | cut -d'=' -f2-)
            PASS=$(grep '^PASS=' meta.txt | cut -d'=' -f2-)
            ALIAS_PASS=$(grep '^ALIAS_PASS=' meta.txt | cut -d'=' -f2-)
            
            if [[ "$FILE_URL" == *".aab" ]]; then
              echo "[INFO] Target is AAB. Using jarsigner..."
              jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore keystore.jks -storepass "$PASS" -keypass "$ALIAS_PASS" input_file "$ALIAS" > /dev/null 2>&1
              mv input_file final_output.aab
              echo "ext=aab" >> $GITHUB_OUTPUT
            else
              echo "[INFO] Target is APK. Using zipalign & apksigner..."
              $BUILD_TOOLS/zipalign -p -f -v 4 input_file aligned_input.apk > /dev/null 2>&1
              $BUILD_TOOLS/apksigner sign --ks keystore.jks --ks-pass pass:"$PASS" --ks-key-alias "$ALIAS" --key-pass pass:"$ALIAS_PASS" aligned_input.apk > /dev/null 2>&1
              mv aligned_input.apk final_output.apk
              echo "ext=apk" >> $GITHUB_OUTPUT
            fi
            
          elif [ "$TOOL_TYPE" == "apk2aab" ]; then
            echo "[INFO] Executing APK to AAB Conversion..."
            
            # 1. Decode APK strictly without source decoding (-s) to preserve exact classes.dex
            java -jar apktool.jar d input_file -s -o decoded_apk -f > /dev/null 2>&1
            
            # 2. Compile resources into flatter format
            $BUILD_TOOLS/aapt2 compile --dir decoded_apk/res -o compiled_resources.zip > /dev/null 2>&1
            
            # 3. Link resources using Protocol Buffers format required by AAB
            $BUILD_TOOLS/aapt2 link --proto-format -o linked_base.apk -I $ANDROID_JAR --manifest decoded_apk/AndroidManifest.xml -R compiled_resources.zip --auto-add-overlay > /dev/null 2>&1
            
            # 4. Extract generated protocol buffer APK
            unzip -q linked_base.apk -d ext_linked
            
            # 5. Build strict AAB Base Module Directory Structure
            mkdir -p bundle/base/manifest bundle/base/dex bundle/base/res bundle/base/root/assets bundle/base/root/lib bundle/base/root/META-INF bundle/base/root/kotlin
            
            cp ext_linked/AndroidManifest.xml bundle/base/manifest/
            cp -r ext_linked/res/* bundle/base/res/ 2>/dev/null || true
            cp ext_linked/resources.pb bundle/base/ 2>/dev/null || true
            
            # Inject raw code and assets
            cp decoded_apk/*.dex bundle/base/dex/ 2>/dev/null || true
            cp -r decoded_apk/assets/* bundle/base/root/assets/ 2>/dev/null || true
            cp -r decoded_apk/lib/* bundle/base/root/lib/ 2>/dev/null || true
            cp -r decoded_apk/kotlin/* bundle/base/root/kotlin/ 2>/dev/null || true
            
            # 6. Zip into base module archive
            cd bundle/base
            zip -qr ../base.zip .
            cd ../..
            
            # 7. Assemble final Android App Bundle
            java -jar bundletool.jar build-bundle --modules=bundle/base.zip --output=final_output.aab > /dev/null 2>&1
            echo "ext=aab" >> $GITHUB_OUTPUT
          fi

      - name: Return Encrypted Artifact
        if: success()
        run: |
          OUT_EXT="${{ steps.executor.outputs.ext }}"
          if [ -f "final_output.$OUT_EXT" ]; then
            echo "[INFO] Artifact generation confirmed. Uploading to secure server..."
            curl -s -X PUT --data-binary @final_output.$OUT_EXT "${{ inputs.webhookUrl }}&tool_status=success&ext=$OUT_EXT" > /dev/null || true
          else
            echo "[ERROR] Missing final_output.$OUT_EXT"
            curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
          fi
          
      - name: Terminate with Failure State
        if: failure()
        run: |
          echo "[ERROR] Job Failed in Workflow."
          curl -s -X GET "${{ inputs.webhookUrl }}&tool_status=failed" > /dev/null || true
