name: React Native Compiler
run-name: Compile ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      
      - name: Init Engine
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          PREFIX="[$(echo "$RAW_NAME" | sed 's/-/ /g')]"
          echo "PREFIX=$PREFIX" >> $GITHUB_ENV
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"$PREFIX Memulai Mesin Kompilasi Cloud...\"}" "${{ inputs.logUrl }}"
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Persistent Keystore Setup
        run: |
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Memverifikasi sertifikat kriptografi...\"}" "${{ inputs.logUrl }}"
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=AppStudio, O=AppStudio, L=Bali, ST=Bali, C=ID" -storepass appstudio2026 -keypass appstudio2026
            git config user.name "Build Engine"
            git config user.email "engine@appbuilder.id"
            git add appstudio.keystore
            git commit -m "System: Generate Persistent Keystore"
            git push origin main
          fi

      - name: Prepare Workspace
        run: |
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Mengekstrak aset aplikasi...\"}" "${{ inputs.logUrl }}"
          echo "${{ inputs.projectZip }}" | base64 -d > project.zip
          unzip -q project.zip -d app
          cd app
          npm install
          npx expo prebuild --platform android || true

      - name: Deep Configuration Injection
        run: |
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menginjeksi konfigurasi Native OS...\"}" "${{ inputs.logUrl }}"
          cd app
          sudo apt-get install -y imagemagick
          wget -q -O icon.png "${{ inputs.iconUrl }}" || curl -sL -o icon.png "${{ inputs.iconUrl }}"
          RES_DIR=$(find . -type d -name "res" | grep "src/main/res" | head -n 1)
          if [ -n "$RES_DIR" ] && [ -f "icon.png" ]; then
            for SIZE in 48 72 96 144 192; do
              DENS=""
              if [ "$SIZE" == "48" ]; then DENS="mdpi"; fi
              if [ "$SIZE" == "72" ]; then DENS="hdpi"; fi
              if [ "$SIZE" == "96" ]; then DENS="xhdpi"; fi
              if [ "$SIZE" == "144" ]; then DENS="xxhdpi"; fi
              if [ "$SIZE" == "192" ]; then DENS="xxxhdpi"; fi
              mkdir -p "$RES_DIR/mipmap-$DENS"
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher.png"
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher_round.png"
            done
          fi
          find . -name "strings.xml" -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">'"${{ inputs.appName }}"'<\/string>/g' {} +
          find . -name "build.gradle" -exec sed -i 's/applicationId ".*"/applicationId "'"${{ inputs.packageName }}"'"/g' {} +
          find . -name "build.gradle" -exec sed -i 's/namespace ".*"/namespace "'"${{ inputs.packageName }}"'"/g' {} +
          find . -name "build.gradle" -exec sed -i 's/minSdkVersion .*/minSdkVersion ${{ inputs.minSdk }}/g' {} +
          find . -name "build.gradle" -exec sed -i 's/targetSdkVersion .*/targetSdkVersion ${{ inputs.targetSdk }}/g' {} +
          find . -name "build.gradle" -exec sed -i 's/compileSdkVersion .*/compileSdkVersion ${{ inputs.targetSdk }}/g' {} +
          find . -name "build.gradle" -exec sed -i 's/versionCode .*/versionCode ${{ inputs.versionCode }}/g' {} +
          find . -name "build.gradle" -exec sed -i 's/versionName ".*"/versionName "'"${{ inputs.versionName }}"'"/g' {} +

      - name: Build & Post-Signing
        run: |
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menjalankan kompilasi Gradle...\"}" "${{ inputs.logUrl }}"
          cd app/android
          chmod +x gradlew
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew assembleRelease
          fi
          cd ../..
          curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menerapkan Digital Signature (Production Keystore)...\"}" "${{ inputs.logUrl }}"
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            AAB_PATH=$(find app/android -name "*.aab" | grep release | head -n 1)
            jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$AAB_PATH" appstudio
            curl -X PUT --data-binary @"$AAB_PATH" "${{ inputs.uploadUrl }}&ext=aab"
          else
            APK_PATH=$(find app/android -name "*.apk" | grep release | head -n 1)
            $ZIPALIGN -p -f -v 4 "$APK_PATH" aligned.apk
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk
            curl -X PUT --data-binary @"aligned.apk" "${{ inputs.uploadUrl }}&ext=apk"
          fi

      - name: Finalize
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"success\"}" "${{ inputs.webhookUrl }}"
          else
            curl -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"failed\"}" "${{ inputs.webhookUrl }}"
          fi
