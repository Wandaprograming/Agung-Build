name: React Native Compiler
run-name: Enterprise Build - ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: System Initialization
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Core] Allocating Secure RN Build Container...\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '17' }

      - name: Persistent Static Keystore
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Security] Verifying Production Cryptography Vault...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=Enterprise, O=AppStudio, L=Jakarta, ST=DKI, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add appstudio.keystore
            git commit -m "System: Secure Vault Generated" > /dev/null 2>&1 || true
            git push origin HEAD:main > /dev/null 2>&1 || true
          fi

      - name: Provision Workspace & Smart Injection
        env:
          ZIP_B64: ${{ inputs.projectZip }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Source] Provisioning Workspace & Expo Config...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          echo "$ZIP_B64" | base64 -d -i > project.zip
          unzip -q -o project.zip -d app/
          cd app
          
          mkdir -p assets
          curl -sL "${{ inputs.iconUrl }}" -o assets/icon.png > /dev/null 2>&1
          
          # Smart Injection menggunakan Node.js (Anti-Crash)
          node -e "
          const fs = require('fs');
          let app = { expo: {} };
          try { app = JSON.parse(fs.readFileSync('app.json', 'utf8')); } catch(e){}
          app.expo.name = '${{ inputs.appName }}';
          app.expo.slug = '${{ inputs.packageName }}'.replace(/\./g, '-');
          app.expo.version = '${{ inputs.versionName }}';
          app.expo.icon = './assets/icon.png';
          app.expo.android = app.expo.android || {};
          app.expo.android.package = '${{ inputs.packageName }}';
          app.expo.android.versionCode = parseInt('${{ inputs.versionCode }}');
          app.expo.android.adaptiveIcon = { foregroundImage: './assets/icon.png', backgroundColor: '#ffffff' };
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2));
          "
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Dependencies] Installing Node Modules...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          npm install --legacy-peer-deps > npm_log.txt 2>&1 || export NPM_FAIL=1
          if [ "$NPM_FAIL" == "1" ]; then
            ERROR_MSG=$(tail -n 20 npm_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g')
            node -e "fetch('${{ inputs.logUrl }}', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: '${{ inputs.id }}', log: \`[BUILD FAILED] NPM Error:\n\n\${process.env.ERROR_MSG}\` }) });" || true
            exit 1
          fi
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Bridge] Translating JavaScript to Native Bindings...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          npx expo prebuild --platform android --clean > pb_log.txt 2>&1 || export PB_FAIL=1
          if [ "$PB_FAIL" == "1" ]; then
            ERROR_MSG=$(tail -n 20 pb_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g')
            node -e "fetch('${{ inputs.logUrl }}', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: '${{ inputs.id }}', log: \`[BUILD FAILED] Prebuild Error:\n\n\${process.env.ERROR_MSG}\` }) });" || true
            exit 1
          fi

      - name: Deep SDK Lockdown
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Manifest] Locking stable SDK dependencies...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          
          # Hapus Adaptive Icon Bawaan agar diganti versi HD
          rm -rf android/app/src/main/res/mipmap-anydpi* 2>/dev/null || true
          
          cat <<EOF >> android/app/build.gradle
          
          configurations.all {
              resolutionStrategy {
                  force 'androidx.browser:browser:1.8.0'
                  force 'androidx.core:core-ktx:1.13.1'
                  force 'androidx.core:core:1.13.1'
              }
          }
          EOF

      - name: Turbo Release Compiler (Smart Error Catcher)
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Compiler] Executing Native Gradle Engine (Release Mode)...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app/android
          chmod +x gradlew
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            ./gradlew bundleRelease --parallel --no-daemon > build_log.txt 2>&1 || export BUILD_FAILED=1
          else
            ./gradlew assembleRelease --parallel --no-daemon > build_log.txt 2>&1 || export BUILD_FAILED=1
          fi
          
          if [ "$BUILD_FAILED" == "1" ]; then
            export ERROR_MSG=$(grep -A 30 "What went wrong:" build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g' || echo "")
            if [ -z "$ERROR_MSG" ]; then export ERROR_MSG=$(tail -n 30 build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g'); fi
            node -e "fetch('${{ inputs.logUrl }}', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: '${{ inputs.id }}', log: \`[BUILD FAILED] Terdapat kesalahan pada kode/package Anda:\n\n\${process.env.ERROR_MSG}\` }) });" || true
            exit 1
          fi

      - name: Artifact Signer & Delivery
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Signer] Applying AES-256 App Signature V2/V3...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            FILE_PATH=$(find app/android/app/build -name "*.aab" | grep release | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$FILE_PATH" appstudio > /dev/null 2>&1
            mv "$FILE_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Delivery] Transmitting Production Artifact to Client...\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            FILE_PATH=$(find app/android/app/build -name "*.apk" | grep release | grep -v unaligned | head -n 1)
            $ZIPALIGN -p -f -v 4 "$FILE_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Delivery] Transmitting Production Artifact to Client...\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize Status
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="success"; fi
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"$STATUS\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
