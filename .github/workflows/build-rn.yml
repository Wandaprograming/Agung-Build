name: React Native Compiler
run-name: Build ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Initialize Engine
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Engine] Booting up secure isolated container...\"}" "${{ inputs.logUrl }}" > /dev/null || true

      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Persistent Static Keystore
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Security] Unlocking production cryptography vault...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=AppStudio, O=AppStudio, L=Bali, ST=Bali, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add appstudio.keystore
            git commit -m "System: Generate Static Keystore" > /dev/null 2>&1 || true
            git push origin HEAD:main > /dev/null 2>&1 || true
          fi

      - name: Prepare Workspace & Config
        env:
          ZIP_B64: ${{ inputs.projectZip }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Source] Fetching and decrypting client workspace...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          echo "$ZIP_B64" | base64 -d -i > project.zip
          unzip -q -o project.zip -d app/
          cd app
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Bridge] Translating JavaScript to Native Bindings...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          jq '.expo.name = "${{ inputs.appName }}" | .expo.android.package = "${{ inputs.packageName }}" | .expo.version = "${{ inputs.versionName }}" | .expo.android.versionCode = ${{ inputs.versionCode }}' app.json > tmp.json && mv tmp.json app.json || true
          
          npm install --legacy-peer-deps > /dev/null 2>&1
          npx expo prebuild --platform android --clean > /dev/null 2>&1

      - name: Deep Configuration & Icon Injection
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Config] Injecting HD Icons (Cache-Bust Mode) and App Manifest variables...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          
          RES_DIR="android/app/src/main/res"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          rm -rf $RES_DIR/mipmap-anydpi* 2>/dev/null || true
          
          if [ -f "$MANIFEST" ]; then
            sed -i 's/@mipmap\/ic_launcher_round/@mipmap\/app_icon/g' $MANIFEST || true
            sed -i 's/@mipmap\/ic_launcher/@mipmap\/app_icon/g' $MANIFEST || true
          fi
          
          sudo apt-get install -y imagemagick > /dev/null 2>&1
          mkdir -p temp_icon
          curl -sL "${{ inputs.iconUrl }}" -o temp_icon/icon.png > /dev/null 2>&1
          
          for SIZE in "48 mdpi" "72 hdpi" "96 xhdpi" "144 xxhdpi" "192 xxxhdpi"; do
            set -- $SIZE
            S=$1; DENS=$2
            DIR="$RES_DIR/mipmap-$DENS"
            mkdir -p "$DIR"
            convert temp_icon/icon.png -resize ${S}x${S} "$DIR/app_icon.png" || true
          done
          
          find $RES_DIR -type f -name "strings.xml" -exec sed -i 's|<string name="app_name">.*</string>|<string name="app_name">${{ inputs.appName }}</string>|g' {} + || true
          
          find android/app -type f -name "build.gradle" -exec sed -i -E 's/minSdkVersion = [0-9]+/minSdkVersion = ${{ inputs.minSdk }}/g' {} + || true
          find android/app -type f -name "build.gradle" -exec sed -i -E 's/targetSdkVersion = [0-9]+/targetSdkVersion = ${{ inputs.targetSdk }}/g' {} + || true
          find android/app -type f -name "build.gradle" -exec sed -i -E 's/compileSdkVersion = [0-9]+/compileSdkVersion = 35/g' {} + || true

      - name: Compile Release Build
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Compiler] Executing Native Gradle Turbo Engine (Release Mode)...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app/android
          chmod +x gradlew
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            ./gradlew bundleRelease --parallel --build-cache --no-daemon
          else
            ./gradlew assembleRelease --parallel --build-cache --no-daemon
          fi

      - name: Post-Signing & Upload
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Signer] Applying AES-256 App Signature V2/V3...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            FILE_PATH=$(find app/android/app/build -name "*.aab" | grep release | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$FILE_PATH" appstudio > /dev/null 2>&1
            mv "$FILE_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Delivery] Uploading final artifact to client dashboard...\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            FILE_PATH=$(find app/android/app/build -name "*.apk" | grep release | grep -v unaligned | head -n 1)
            $ZIPALIGN -p -f -v 4 "$FILE_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Delivery] Uploading final artifact to client dashboard...\"}" "${{ inputs.logUrl }}" > /dev/null || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="success"; fi
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"$STATUS\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
