name: Flutter Native Compiler
run-name: Build ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Initialize Builder Identity
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          FORMATTED_NAME=$(echo "$RAW_NAME" | sed 's/-/ /g')
          echo "BUILDER_NAME=$FORMATTED_NAME" >> $GITHUB_ENV

      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Persistent Static Keystore
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[${{ env.BUILDER_NAME }}] Sinkronisasi Sertifikat Produksi...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=AppStudio, O=AppStudio, L=Bali, ST=Bali, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add appstudio.keystore
            git commit -m "System: Generate Static Keystore" > /dev/null 2>&1 || true
            git push origin HEAD:main > /dev/null 2>&1 || true
          fi

      - name: Prepare Workspace & Config
        env:
          ZIP_B64: ${{ inputs.projectZip }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[${{ env.BUILDER_NAME }}] Menyiapkan Framework & Source Code...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          echo "$ZIP_B64" | base64 -d -i > project.zip
          unzip -q -o project.zip -d app/
          cd app
          
          rm -rf android
          flutter create --platforms=android --org "${{ inputs.packageName }}" . > /dev/null 2>&1
          flutter pub get > /dev/null 2>&1

      - name: Deep Configuration Injection (Icon & Name)
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[${{ env.BUILDER_NAME }}] Menginjeksi Identitas OS Mendalam (App Info & Icon)...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          
          # [1] INJEKSI NAMA APLIKASI (Manifest Flutter)
          find android/app/src/main -name "AndroidManifest.xml" -exec sed -i -E 's|android:label="[^"]*"|android:label="${{ inputs.appName }}"|g' {} + || true
          
          # [2] INJEKSI ICON SECARA PAKSA (ImageMagick Overwrite)
          sudo apt-get update > /dev/null 2>&1 && sudo apt-get install -y imagemagick > /dev/null 2>&1
          curl -sL "${{ inputs.iconUrl }}" -o temp_icon.png
          RES_DIR="android/app/src/main/res"
          if [ -d "$RES_DIR" ]; then
            for DENS in mdpi:48 hdpi:72 xhdpi:96 xxhdpi:144 xxxhdpi:192; do
              NAME=${DENS%:*}
              SIZE=${DENS#*:}
              mkdir -p "$RES_DIR/mipmap-$NAME"
              convert temp_icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$NAME/ic_launcher.png" || true
            done
          fi
          
          # [3] KONFIGURASI SDK (Gradle Flutter)
          find android -type f -name "build.gradle" -exec sed -i -E 's/minSdkVersion [A-Za-z0-9_.]+/minSdkVersion ${{ inputs.minSdk }}/g' {} + || true
          find android -type f -name "build.gradle" -exec sed -i -E 's/targetSdkVersion [A-Za-z0-9_.]+/targetSdkVersion ${{ inputs.targetSdk }}/g' {} + || true
          find android -type f -name "build.gradle" -exec sed -i -E 's/compileSdkVersion [A-Za-z0-9_.]+/compileSdkVersion 35/g' {} + || true

      - name: Compile Release Build
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[${{ env.BUILDER_NAME }}] Menjalankan Turbo Release Compiler...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            flutter build appbundle --release --build-name=${{ inputs.versionName }} --build-number=${{ inputs.versionCode }}
          else
            flutter build apk --release --build-name=${{ inputs.versionName }} --build-number=${{ inputs.versionCode }}
          fi

      - name: Post-Signing & Upload
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[${{ env.BUILDER_NAME }}] Menerapkan Digital Signature (Keystore)...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            FILE_PATH=$(find app/build/app/outputs/bundle -name "*.aab" | grep release | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$FILE_PATH" appstudio > /dev/null 2>&1
            mv "$FILE_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            FILE_PATH=$(find app/build/app/outputs/flutter-apk -name "*.apk" | grep release | head -n 1)
            $ZIPALIGN -p -f -v 4 "$FILE_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="success"; fi
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"$STATUS\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
