name: Flutter Native Compiler
run-name: Compile ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      
      - name: Init Engine
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          PREFIX="[$(echo "$RAW_NAME" | sed 's/-/ /g')]"
          echo "PREFIX=$PREFIX" >> $GITHUB_ENV
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"$PREFIX Memulai Mesin Kompilasi Cloud...\"}" "${{ inputs.logUrl }}" > /dev/null
          
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          
      - name: Persistent Keystore Setup
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Memverifikasi sertifikat kriptografi...\"}" "${{ inputs.logUrl }}" > /dev/null
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=AppStudio, O=AppStudio, L=Bali, ST=Bali, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
            git config user.name "Build Engine"
            git config user.email "engine@appbuilder.id"
            git add appstudio.keystore
            git commit -m "System: Keystore for ${{ inputs.appName }}" > /dev/null 2>&1
            git push origin main > /dev/null 2>&1
          fi

      - name: Prepare Workspace
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Mengekstrak aset dan regenerasi OS Native...\"}" "${{ inputs.logUrl }}" > /dev/null
          echo "${{ inputs.projectZip }}" | base64 -d > project.zip
          unzip -q project.zip -d app > /dev/null 2>&1
          cd app
          rm -rf android
          flutter create --platforms=android . > /dev/null 2>&1
          flutter clean > /dev/null 2>&1
          flutter pub get > /dev/null 2>&1

      - name: Deep Configuration Injection
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menginjeksi konfigurasi Native OS...\"}" "${{ inputs.logUrl }}" > /dev/null
          cd app
          sudo apt-get install -y imagemagick > /dev/null 2>&1
          wget -q -O icon.png "${{ inputs.iconUrl }}" || curl -sL -o icon.png "${{ inputs.iconUrl }}" > /dev/null 2>&1
          RES_DIR=$(find . -type d -name "res" | grep "src/main/res" | head -n 1)
          if [ -n "$RES_DIR" ] && [ -f "icon.png" ]; then
            for SIZE in 48 72 96 144 192; do
              DENS=""
              if [ "$SIZE" == "48" ]; then DENS="mdpi"; fi
              if [ "$SIZE" == "72" ]; then DENS="hdpi"; fi
              if [ "$SIZE" == "96" ]; then DENS="xhdpi"; fi
              if [ "$SIZE" == "144" ]; then DENS="xxhdpi"; fi
              if [ "$SIZE" == "192" ]; then DENS="xxxhdpi"; fi
              mkdir -p "$RES_DIR/mipmap-$DENS"
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher.png"
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher_round.png"
            done
          fi
          find . -name "AndroidManifest.xml" -exec sed -i 's/android:label="[^"]*"/android:label="'"${{ inputs.appName }}"'"/g' {} +
          find . -name "build.gradle" -exec sed -i -E 's/applicationId [=]? ?".*"/applicationId = "'"${{ inputs.packageName }}"'"/g' {} +
          find . -name "build.gradle" -exec sed -i -E 's/namespace [=]? ?".*"/namespace = "'"${{ inputs.packageName }}"'"/g' {} +
          find . -name "build.gradle" -exec sed -i -E 's/minSdkVersion .*/minSdkVersion = ${{ inputs.minSdk }}/g' {} +
          find . -name "build.gradle" -exec sed -i -E 's/targetSdkVersion .*/targetSdkVersion = ${{ inputs.targetSdk }}/g' {} +
          find . -name "build.gradle" -exec sed -i -E 's/compileSdkVersion .*/compileSdkVersion = ${{ inputs.targetSdk }}/g' {} +

      - name: Build & Post-Signing
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menjalankan kompilasi Flutter Engine...\"}" "${{ inputs.logUrl }}" > /dev/null
          cd app
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            flutter build appbundle --release --build-name=${{ inputs.versionName }} --build-number=${{ inputs.versionCode }} > /dev/null 2>&1
          else
            flutter build apk --release --build-name=${{ inputs.versionName }} --build-number=${{ inputs.versionCode }} > /dev/null 2>&1
          fi
          cd ..
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menerapkan Digital Signature (Production Keystore)...\"}" "${{ inputs.logUrl }}" > /dev/null
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            AAB_PATH=$(find app/build -name "*.aab" | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$AAB_PATH" appstudio > /dev/null 2>&1
            mv "$AAB_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null
          else
            APK_PATH=$(find app/build -name "*.apk" | grep release | head -n 1)
            $ZIPALIGN -p -f -v 4 "$APK_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null
          fi

      - name: Finalize
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"success\"}" "${{ inputs.webhookUrl }}" > /dev/null
          else
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"failed\"}" "${{ inputs.webhookUrl }}" > /dev/null
          fi
