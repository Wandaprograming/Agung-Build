name: Pro Native Compiler
run-name: Compile ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      
      - name: Init Engine
        run: |
          RAW_NAME="${{ github.event.repository.name }}"
          PREFIX="[$(echo "$RAW_NAME" | sed 's/-/ /g')]"
          echo "PREFIX=$PREFIX" >> $GITHUB_ENV
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"$PREFIX Memulai Mesin Kompilasi Cloud...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'
          
      - name: Persistent Keystore Setup
        env:
          APP_NAME: ${{ inputs.appName }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Memverifikasi sertifikat kriptografi...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=AppStudio, O=AppStudio, L=Bali, ST=Bali, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1 || true
            git config user.name "Build Engine"
            git config user.email "engine@appbuilder.id"
            git add appstudio.keystore
            git commit -m "System: Keystore for $APP_NAME" > /dev/null 2>&1 || true
            git push origin main > /dev/null 2>&1 || true
          fi

      - name: Prepare Workspace
        env:
          ZIP_B64: ${{ inputs.projectZip }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Mengekstrak aset aplikasi...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          
          # Install global capacitor & ignore errors to prevent crash
          npm install -g @capacitor/cli @capacitor/core > /dev/null 2>&1 || true
          
          mkdir -p app
          if [ "${{ inputs.mode }}" == "webview" ]; then
            npx cap create app "App" "${{ inputs.packageName }}" --web-dir www > /dev/null 2>&1 || true
            cd app
            mkdir -p www
            echo "<script>window.location.href='${{ inputs.url }}';</script>" > www/index.html
            npm install @capacitor/android > /dev/null 2>&1 || true
            npx cap add android > /dev/null 2>&1 || true
          else
            echo "$ZIP_B64" | base64 -d > project.zip || true
            unzip -q project.zip -d app > /dev/null 2>&1 || true
            cd app
            
            # Use || true to prevent script termination if npm fails
            npm install > /dev/null 2>&1 || true
            
            if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
              npx cap init "${{ inputs.appName }}" "${{ inputs.packageName }}" --web-dir . > /dev/null 2>&1 || true
            fi
            
            npm install @capacitor/android > /dev/null 2>&1 || true
            npx cap add android > /dev/null 2>&1 || true
            npx cap sync android > /dev/null 2>&1 || true
          fi

      - name: Deep Configuration Injection
        env:
          APP_NAME: ${{ inputs.appName }}
          PKG_NAME: ${{ inputs.packageName }}
          MIN_SDK: ${{ inputs.minSdk }}
          TARGET_SDK: ${{ inputs.targetSdk }}
          VER_CODE: ${{ inputs.versionCode }}
          VER_NAME: ${{ inputs.versionName }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menginjeksi konfigurasi Native OS...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          sudo apt-get install -y imagemagick > /dev/null 2>&1 || true
          wget -q -O icon.png "${{ inputs.iconUrl }}" || curl -sL -o icon.png "${{ inputs.iconUrl }}" > /dev/null 2>&1 || true
          RES_DIR=$(find . -type d -name "res" | grep "src/main/res" | head -n 1)
          if [ -n "$RES_DIR" ] && [ -f "icon.png" ]; then
            for SIZE in 48 72 96 144 192; do
              DENS=""
              if [ "$SIZE" == "48" ]; then DENS="mdpi"; fi
              if [ "$SIZE" == "72" ]; then DENS="hdpi"; fi
              if [ "$SIZE" == "96" ]; then DENS="xhdpi"; fi
              if [ "$SIZE" == "144" ]; then DENS="xxhdpi"; fi
              if [ "$SIZE" == "192" ]; then DENS="xxxhdpi"; fi
              mkdir -p "$RES_DIR/mipmap-$DENS"
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher.png" || true
              convert icon.png -resize ${SIZE}x${SIZE} "$RES_DIR/mipmap-$DENS/ic_launcher_round.png" || true
            done
          fi
          find . -name "strings.xml" -exec sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">'"$APP_NAME"'<\/string>/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/applicationId [=]? ?".*"/applicationId = "'"$PKG_NAME"'"/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/namespace [=]? ?".*"/namespace = "'"$PKG_NAME"'"/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/minSdkVersion .*/minSdkVersion = '"$MIN_SDK"'/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/targetSdkVersion .*/targetSdkVersion = '"$TARGET_SDK"'/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/compileSdkVersion .*/compileSdkVersion = '"$TARGET_SDK"'/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/versionCode .*/versionCode = '"$VER_CODE"'/g' {} + || true
          find . -name "build.gradle" -exec sed -i -E 's/versionName [=]? ?".*"/versionName = "'"$VER_NAME"'"/g' {} + || true

      - name: Build & Post-Signing
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menjalankan kompilasi Gradle...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app/android
          chmod +x gradlew
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            ./gradlew bundleRelease
          else
            ./gradlew assembleRelease
          fi
          cd ../..
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"${{ env.PREFIX }} Menerapkan Digital Signature...\"}" "${{ inputs.logUrl }}" > /dev/null || true
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          if [ "${{ inputs.buildFormat }}" == "aab" ]; then
            AAB_PATH=$(find app/android -name "*.aab" | grep release | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$AAB_PATH" appstudio > /dev/null 2>&1 || true
            mv "$AAB_PATH" "${SAFE_APP_NAME}.aab" || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            APK_PATH=$(find app/android -name "*.apk" | grep release | head -n 1)
            $ZIPALIGN -p -f -v 4 "$APK_PATH" aligned.apk > /dev/null 2>&1 || true
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1 || true
            mv aligned.apk "${SAFE_APP_NAME}.apk" || true
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"success\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
          else
            curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"failed\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
          fi
