name: Pro Native Compiler
run-name: Enterprise Build - ${{ inputs.appName }}
on:
  workflow_dispatch:
    inputs:
      id: { required: true, type: string }
      appName: { required: true, type: string }
      packageName: { required: true, type: string }
      versionCode: { required: true, type: string }
      versionName: { required: true, type: string }
      iconUrl: { required: true, type: string }
      webhookUrl: { required: true, type: string }
      uploadUrl: { required: true, type: string }
      logUrl: { required: true, type: string }
      mode: { required: true, type: string }
      url: { required: false, type: string }
      projectZip: { required: false, type: string }
      buildFormat: { required: false, type: string, default: 'apk' }
      minSdk: { required: false, type: string, default: '24' }
      targetSdk: { required: false, type: string, default: '34' }

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Initialize Compile Matrix
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Core] Provisioning High-Performance Compile Matrix...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          sudo fallocate -l 4G /mnt/matrix_swap 2>/dev/null || sudo dd if=/dev/zero of=/mnt/matrix_swap bs=1M count=4096 2>/dev/null
          sudo chmod 600 /mnt/matrix_swap
          sudo mkswap /mnt/matrix_swap 2>/dev/null || true
          sudo swapon /mnt/matrix_swap 2>/dev/null || true
          sudo sysctl vm.swappiness=10 2>/dev/null || true

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: actions/setup-java@v4
        with: { distribution: 'zulu', java-version: '21' }

      - name: Cache Build Engine
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.npm
            app/node_modules
          key: cap-build-engine-${{ hashFiles('**/package.json') }}
          restore-keys: |
            cap-build-engine-

      - name: Cache Production Keystore
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: appstudio.keystore
          key: appstudio-keystore-${{ inputs.packageName }}

      - name: Production Cryptography Vault
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Security] Verifying Production Cryptography Vault...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          if [ ! -f "appstudio.keystore" ]; then
            keytool -genkeypair -v -keystore appstudio.keystore -alias appstudio -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=AppStudio, OU=Enterprise, O=AppStudio, L=Jakarta, ST=DKI, C=ID" -storepass appstudio2026 -keypass appstudio2026 > /dev/null 2>&1
          fi

      - name: Prepare Workspace & Config
        env:
          ZIP_B64: ${{ inputs.projectZip }}
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Source] Fetching and provisioning workspace...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          mkdir -p app/www
          
          if [ "${{ inputs.mode }}" == "webview" ] || [ "${{ inputs.buildFormat }}" == "debug_apk" ]; then
            echo "<script>window.location.href='${{ inputs.url }}';</script>" > app/www/index.html
            echo '{"name":"webview-app","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest"},"devDependencies":{"@capacitor/cli":"latest"}}' > app/package.json
          else
            echo "$ZIP_B64" | base64 -d -i > project.zip
            unzip -q -o project.zip -d app/www/
            
            mv app/www/package.json app/ 2>/dev/null || echo '{"name":"app","version":"1.0.0","dependencies":{"@capacitor/core":"latest","@capacitor/android":"latest"},"devDependencies":{"@capacitor/cli":"latest"}}' > app/package.json
            mv app/www/capacitor.config.json app/ 2>/dev/null || true
            mv app/www/studio.config.json app/ 2>/dev/null || true
            rm -f app/www/setup.js 2>/dev/null || true
          fi
          
          # Hapus postinstall untuk mencegah error NPM
          sed -i 's/"postinstall": "node setup.js"/"postinstall": "echo OK"/g' app/package.json || true
          
          cd app
          
          node -e "
          const fs = require('fs');
          let cfg = { appId: '${{ inputs.packageName }}', appName: '${{ inputs.appName }}', webDir: 'www', bundledWebRuntime: false, server: { allowNavigation: ['*'], cleartext: true } };
          if (fs.existsSync('capacitor.config.json')) {
            try {
              let existing = JSON.parse(fs.readFileSync('capacitor.config.json', 'utf8'));
              cfg = Object.assign(existing, cfg);
              cfg.server = Object.assign(existing.server || {}, cfg.server);
            } catch(e) {}
          }
          fs.writeFileSync('capacitor.config.json', JSON.stringify(cfg, null, 2));
          "
          
          if ! npm install --no-audit --no-fund --legacy-peer-deps --prefer-offline > npm_log.txt 2>&1; then
             ERROR_MSG=$(tail -n 20 npm_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
             jq -n --arg id "${{ inputs.id }}" --arg log "[BUILD FAILED] System package initialization failed:\n$ERROR_MSG\n" '{"id": $id, "log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
             exit 1
          fi
          
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Bridge] Injecting Native Bridge Components...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          
          # AUTOMATED NATIVE BRIDGE BUNDLER
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const deps = Object.keys(pkg.dependencies || {}).filter(d => d.startsWith('@capacitor/') && !['@capacitor/core', '@capacitor/android', '@capacitor/ios', '@capacitor/cli'].includes(d));
          let imports = 'import { Capacitor } from \"@capacitor/core\";\n';
          let assigns = 'window.AppCapacitor = Capacitor;\nwindow.AppPlugins = {};\n';
          deps.forEach((dep, i) => {
              imports += 'import * as Plugin' + i + ' from \"' + dep + '\";\n';
              assigns += 'Object.assign(window.AppPlugins, Plugin' + i + ');\n';
          });
          fs.writeFileSync('bridge-entry.js', imports + assigns);
          "
          npx esbuild bridge-entry.js --bundle --minify --outfile=www/capacitor-runtime.js || true
          
          if [ "${{ inputs.mode }}" == "code" ]; then
             if [ -f "www/index.html" ] && [ -f "www/capacitor-runtime.js" ]; then
                sed -i 's|</body>|<script src="capacitor-runtime.js"></script>\n</body>|gi' www/index.html || true
                if ! grep -q "capacitor-runtime.js" www/index.html; then
                   echo '<script src="capacitor-runtime.js"></script>' >> www/index.html
                fi
             fi
          fi
          
          if ! npx --yes @capacitor/cli add android > cap_log.txt 2>&1; then
             ERROR_MSG=$(tail -n 20 cap_log.txt | sed 's/"/\\"/g' | sed ':a;N;$!ba;s/\n/\\n/g')
             jq -n --arg id "${{ inputs.id }}" --arg log "[BUILD FAILED] Bridge injection failed:\n$ERROR_MSG\n" '{"id": $id, "log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
             exit 1
          fi
          
          npx cap sync android > /dev/null 2>&1 || true

      - name: Deep Identity Injection & Asset Sync
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Manifest] Injecting Identity & Core Config...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app
          RES_DIR="android/app/src/main/res"
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          
          rm -rf $RES_DIR/mipmap-anydpi* 2>/dev/null || true
          find $RES_DIR -name "ic_launcher*.xml" -delete 2>/dev/null || true
          
          sed -i 's/@mipmap\/ic_launcher_round/@mipmap\/app_icon_production_round/g' $MANIFEST || true
          sed -i 's/@mipmap\/ic_launcher/@mipmap\/app_icon_production/g' $MANIFEST || true
          
          node -e "
          const fs = require('fs');
          const path = '$MANIFEST';
          if (fs.existsSync('studio.config.json')) {
            try {
              const config = JSON.parse(fs.readFileSync('studio.config.json', 'utf8'));
              let content = fs.readFileSync(path, 'utf8');
              
              if (config.permissions && Array.isArray(config.permissions)) {
                config.permissions.forEach(p => {
                  if (!content.includes('android:name=\"' + p + '\"')) {
                    content = content.replace('</manifest>', '    <uses-permission android:name=\"' + p + '\" />\n</manifest>');
                  }
                });
              }
              
              if (config.metaData && typeof config.metaData === 'object') {
                Object.entries(config.metaData).forEach(([k, v]) => {
                  if (!content.includes('android:name=\"' + k + '\"')) {
                    content = content.replace('</application>', '        <meta-data android:name=\"' + k + '\" android:value=\"' + v + '\" />\n    </application>');
                  }
                });
              }
              fs.writeFileSync(path, content);
            } catch (e) { console.log(e); }
          }
          "

          sudo apt-get install -y imagemagick file > /dev/null 2>&1 || true
          mkdir -p temp_icon
          
          curl -sL "${{ inputs.iconUrl }}" -o temp_icon/downloaded_icon || true
          
          if file temp_icon/downloaded_icon | grep -qE 'image|bitmap'; then
            mv temp_icon/downloaded_icon temp_icon/icon.png
          else
            convert -size 512x512 xc:"#10b981" -gravity center -pointsize 120 -fill white -font Arial -annotate 0 "APP" temp_icon/icon.png
          fi
          
          for SIZE in "48 mdpi" "72 hdpi" "96 xhdpi" "144 xxhdpi" "192 xxxhdpi"; do
            set -- $SIZE
            S=$1; DENS=$2
            DIR="$RES_DIR/mipmap-$DENS"
            mkdir -p "$DIR"
            convert temp_icon/icon.png -resize ${S}x${S} "$DIR/app_icon_production.png"
            convert temp_icon/icon.png -resize ${S}x${S} "$DIR/app_icon_production_round.png"
          done
          
          MAIN_ACTIVITY=$(find android/app/src/main/java -type f -name "MainActivity.java" | head -n 1)
          if [ ! -z "$MAIN_ACTIVITY" ]; then
             OLD_PACKAGE=$(grep -o 'package .*;' "$MAIN_ACTIVITY" | sed 's/package //; s/;//' | tr -d '\r' | tr -d ' ')
             if [ ! -z "$OLD_PACKAGE" ]; then
               find android/app -type f \( -name "*.xml" -o -name "*.gradle" -o -name "*.java" -o -name "*.kt" -o -name "*.json" \) -exec sed -i "s/$OLD_PACKAGE/${{ inputs.packageName }}/g" {} + || true
             fi
             NEW_DIR="android/app/src/main/java/$(echo ${{ inputs.packageName }} | tr '.' '/')"
             mkdir -p "$NEW_DIR"
             if [ "$MAIN_ACTIVITY" != "$NEW_DIR/MainActivity.java" ]; then
               mv "$MAIN_ACTIVITY" "$NEW_DIR/" || true
             fi
             
             echo "package ${{ inputs.packageName }};" > "$NEW_DIR/MainActivity.java"
             echo "import android.os.Bundle;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.view.View;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.webkit.WebView;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.webkit.WebSettings;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.webkit.WebResourceRequest;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.webkit.WebViewClient;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.widget.Toast;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.content.Intent;" >> "$NEW_DIR/MainActivity.java"
             echo "import android.net.Uri;" >> "$NEW_DIR/MainActivity.java"
             echo "import com.getcapacitor.BridgeActivity;" >> "$NEW_DIR/MainActivity.java"
             echo "public class MainActivity extends BridgeActivity {" >> "$NEW_DIR/MainActivity.java"
             echo "    private long backPressedTime = 0;" >> "$NEW_DIR/MainActivity.java"
             echo "    @Override" >> "$NEW_DIR/MainActivity.java"
             echo "    public void onCreate(Bundle savedInstanceState) {" >> "$NEW_DIR/MainActivity.java"
             echo "        super.onCreate(savedInstanceState);" >> "$NEW_DIR/MainActivity.java"
             echo "        hideSystemUI();" >> "$NEW_DIR/MainActivity.java"
             echo "    }" >> "$NEW_DIR/MainActivity.java"
             echo "    @Override" >> "$NEW_DIR/MainActivity.java"
             echo "    public void onWindowFocusChanged(boolean hasFocus) {" >> "$NEW_DIR/MainActivity.java"
             echo "        super.onWindowFocusChanged(hasFocus);" >> "$NEW_DIR/MainActivity.java"
             echo "        if (hasFocus) { hideSystemUI(); }" >> "$NEW_DIR/MainActivity.java"
             echo "    }" >> "$NEW_DIR/MainActivity.java"
             echo "    private void hideSystemUI() {" >> "$NEW_DIR/MainActivity.java"
             echo "        if (android.os.Build.VERSION.SDK_INT >= android.os.Build.VERSION_CODES.R) {" >> "$NEW_DIR/MainActivity.java"
             echo "            getWindow().setDecorFitsSystemWindows(false);" >> "$NEW_DIR/MainActivity.java"
             echo "            android.view.WindowInsetsController controller = getWindow().getInsetsController();" >> "$NEW_DIR/MainActivity.java"
             echo "            if (controller != null) {" >> "$NEW_DIR/MainActivity.java"
             echo "                controller.hide(android.view.WindowInsets.Type.statusBars() | android.view.WindowInsets.Type.navigationBars());" >> "$NEW_DIR/MainActivity.java"
             echo "                controller.setSystemBarsBehavior(android.view.WindowInsetsController.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE);" >> "$NEW_DIR/MainActivity.java"
             echo "            }" >> "$NEW_DIR/MainActivity.java"
             echo "        } else {" >> "$NEW_DIR/MainActivity.java"
             echo "            getWindow().getDecorView().setSystemUiVisibility(" >> "$NEW_DIR/MainActivity.java"
             echo "                View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY" >> "$NEW_DIR/MainActivity.java"
             echo "                | View.SYSTEM_UI_FLAG_LAYOUT_STABLE" >> "$NEW_DIR/MainActivity.java"
             echo "                | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION" >> "$NEW_DIR/MainActivity.java"
             echo "                | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN" >> "$NEW_DIR/MainActivity.java"
             echo "                | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION" >> "$NEW_DIR/MainActivity.java"
             echo "                | View.SYSTEM_UI_FLAG_FULLSCREEN" >> "$NEW_DIR/MainActivity.java"
             echo "            );" >> "$NEW_DIR/MainActivity.java"
             echo "        }" >> "$NEW_DIR/MainActivity.java"
             echo "    }" >> "$NEW_DIR/MainActivity.java"
             echo "    @Override" >> "$NEW_DIR/MainActivity.java"
             echo "    public void onStart() {" >> "$NEW_DIR/MainActivity.java"
             echo "        super.onStart();" >> "$NEW_DIR/MainActivity.java"
             echo "        WebView webView = this.bridge.getWebView();" >> "$NEW_DIR/MainActivity.java"
             echo "        if (webView != null) {" >> "$NEW_DIR/MainActivity.java"
             echo "            WebSettings settings = webView.getSettings();" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setDomStorageEnabled(true);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setJavaScriptEnabled(true);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setMediaPlaybackRequiresUserGesture(false);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setCacheMode(WebSettings.LOAD_DEFAULT);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setAllowFileAccessFromFileURLs(true);" >> "$NEW_DIR/MainActivity.java"
             echo "            settings.setAllowUniversalAccessFromFileURLs(true);" >> "$NEW_DIR/MainActivity.java"
             echo "            webView.setOverScrollMode(View.OVER_SCROLL_NEVER);" >> "$NEW_DIR/MainActivity.java"
             echo "            /* WEBVIEW_MODE_HOOK */" >> "$NEW_DIR/MainActivity.java"
             echo "        }" >> "$NEW_DIR/MainActivity.java"
             echo "    }" >> "$NEW_DIR/MainActivity.java"
             echo "    @Override" >> "$NEW_DIR/MainActivity.java"
             echo "    public void onBackPressed() {" >> "$NEW_DIR/MainActivity.java"
             echo "        WebView webView = this.bridge.getWebView();" >> "$NEW_DIR/MainActivity.java"
             echo "        if (webView != null && webView.canGoBack()) {" >> "$NEW_DIR/MainActivity.java"
             echo "            webView.goBack();" >> "$NEW_DIR/MainActivity.java"
             echo "        } else {" >> "$NEW_DIR/MainActivity.java"
             echo "            long t = System.currentTimeMillis();" >> "$NEW_DIR/MainActivity.java"
             echo "            if (t - backPressedTime > 2000) {" >> "$NEW_DIR/MainActivity.java"
             echo "                backPressedTime = t;" >> "$NEW_DIR/MainActivity.java"
             echo "                Toast.makeText(this, \"Tekan sekali lagi untuk keluar\", Toast.LENGTH_SHORT).show();" >> "$NEW_DIR/MainActivity.java"
             echo "            } else {" >> "$NEW_DIR/MainActivity.java"
             echo "                super.onBackPressed();" >> "$NEW_DIR/MainActivity.java"
             echo "            }" >> "$NEW_DIR/MainActivity.java"
             echo "        }" >> "$NEW_DIR/MainActivity.java"
             echo "    }" >> "$NEW_DIR/MainActivity.java"
             echo "}" >> "$NEW_DIR/MainActivity.java"
             
             if [ "${{ inputs.mode }}" == "webview" ] || [ "${{ inputs.buildFormat }}" == "debug_apk" ]; then
                 sed -i 's|/\* WEBVIEW_MODE_HOOK \*/|webView.setWebViewClient(new WebViewClient() { @Override public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) { String url = request.getUrl().toString(); String host = request.getUrl().getHost(); String targetUrl = "${{ inputs.url }}"; String targetHost = ""; try { targetHost = new java.net.URL(targetUrl).getHost(); } catch (Exception e) {} if (host != null \&\& targetHost != null \&\& host.contains(targetHost)) { return false; } else { Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url)); view.getContext().startActivity(intent); return true; } } });|g' "$NEW_DIR/MainActivity.java"
             fi
          fi
          
          find $RES_DIR -type f -name "strings.xml" -exec sed -i 's|<string name="app_name">.*</string>|<string name="app_name">${{ inputs.appName }}</string>|g' {} + || true
          find $RES_DIR -type f -name "strings.xml" -exec sed -i 's|<string name="title_activity_main">.*</string>|<string name="title_activity_main">${{ inputs.appName }}</string>|g' {} + || true
          find android/app -type f -name "build.gradle" -exec sed -i -E 's/versionCode [0-9]+/versionCode ${{ inputs.versionCode }}/g' {} + || true
          find android/app -type f -name "build.gradle" -exec sed -i -E 's/versionName "[^"]*"/versionName "${{ inputs.versionName }}"/g' {} + || true
          
          NODE_PATH=$(which node)
          echo "NODE_BINARY=$NODE_PATH" >> android/gradle.properties
          echo "org.gradle.jvmargs=-Xmx5120m -XX:MaxMetaspaceSize=1024m -XX:+UseParallelGC -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8" >> android/gradle.properties
          echo "org.gradle.daemon=false" >> android/gradle.properties
          echo "org.gradle.parallel=true" >> android/gradle.properties
          echo "org.gradle.caching=true" >> android/gradle.properties
          echo "org.gradle.configuration-cache=true" >> android/gradle.properties
          echo "org.gradle.vfs.watch=true" >> android/gradle.properties
          echo "org.gradle.configureondemand=true" >> android/gradle.properties
          echo "android.enableJetifier=true" >> android/gradle.properties
          echo "android.useAndroidX=true" >> android/gradle.properties

      - name: Turbo Release Engine
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Engine] Executing Native Core Engine...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          cd app/android
          chmod +x gradlew
          
          if [ "${{ inputs.buildFormat }}" == "debug_apk" ]; then
            ./gradlew assembleDebug --parallel --no-daemon --build-cache --configure-on-demand > build_log.txt 2>&1 || export BUILD_FAILED=1
          elif [ "${{ inputs.buildFormat }}" == "aab" ]; then
            ./gradlew bundleRelease --parallel --no-daemon --build-cache --configure-on-demand > build_log.txt 2>&1 || export BUILD_FAILED=1
          else
            ./gradlew assembleRelease --parallel --no-daemon --build-cache --configure-on-demand > build_log.txt 2>&1 || export BUILD_FAILED=1
          fi
          
          if [ "$BUILD_FAILED" == "1" ]; then
            ERROR_MSG=$(grep -A 30 "What went wrong:" build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g' || echo "")
            if [ -z "$ERROR_MSG" ]; then ERROR_MSG=$(tail -n 30 build_log.txt | sed 's|/home/runner/work/[^/]*/[^/]*/|Workspace/|g'); fi
            jq -n --arg id "${{ inputs.id }}" --arg log "[BUILD FAILED] Core configuration error detected:\n$ERROR_MSG\n" '{"id": $id, "log": $log}' | curl -s -X POST -H "Content-Type: application/json" -d @- "${{ inputs.logUrl }}" || true
            exit 1
          fi

      - name: Artifact Signer & Delivery
        if: success()
        run: |
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"log\": \"[Signer] Preparing Artifact & Uploading...\\n\"}" "${{ inputs.logUrl }}" > /dev/null || true
          ZIPALIGN=$(find $ANDROID_SDK_ROOT/build-tools -name zipalign | sort -V | tail -n 1)
          APKSIGNER=$(find $ANDROID_SDK_ROOT/build-tools -name apksigner | sort -V | tail -n 1)
          SAFE_APP_NAME=$(echo "${{ inputs.appName }}" | sed 's/[^a-zA-Z0-9]/_/g')
          
          if [ "${{ inputs.buildFormat }}" == "debug_apk" ]; then
            FILE_PATH=$(find app/android/app/build -name "*.apk" | grep debug | head -n 1)
            mv "$FILE_PATH" "${SAFE_APP_NAME}_debug.apk"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}_debug.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          elif [ "${{ inputs.buildFormat }}" == "aab" ]; then
            FILE_PATH=$(find app/android/app/build/outputs/bundle/release -name "*.aab" | head -n 1)
            jarsigner -sigalg SHA256withRSA -digestalg SHA-256 -keystore appstudio.keystore -storepass appstudio2026 "$FILE_PATH" appstudio > /dev/null 2>&1
            mv "$FILE_PATH" "${SAFE_APP_NAME}.aab"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.aab" "${{ inputs.uploadUrl }}&ext=aab" > /dev/null || true
          else
            FILE_PATH=$(find app/android/app/build -name "*.apk" | grep release | grep -v unaligned | head -n 1)
            $ZIPALIGN -p -f -v 4 "$FILE_PATH" aligned.apk > /dev/null 2>&1
            $APKSIGNER sign --ks appstudio.keystore --ks-pass pass:appstudio2026 --ks-key-alias appstudio --key-pass pass:appstudio2026 aligned.apk > /dev/null 2>&1
            mv aligned.apk "${SAFE_APP_NAME}.apk"
            curl -s -X PUT --data-binary @"${SAFE_APP_NAME}.apk" "${{ inputs.uploadUrl }}&ext=apk" > /dev/null || true
          fi

      - name: Finalize Matrix Status
        if: always()
        run: |
          STATUS="failed"
          if [ "${{ job.status }}" == "success" ]; then STATUS="success"; fi
          curl -s -X POST -H "Content-Type: application/json" -d "{\"id\": \"${{ inputs.id }}\", \"status\": \"$STATUS\"}" "${{ inputs.webhookUrl }}" > /dev/null || true
